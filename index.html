<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>おかねの相談室 | りそなグループ AIアドバイザー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600&family=Shippori+Mincho:wght@400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --green:      #01894d;
      --green-dark: #005c35;
      --green-mid:  #019a58;
      --green-lite: #dff2ea;
      --green-pale: #f0faf5;
      --orange:      #e8680a;
      --orange-mid: #f07800;
      --orange-pale:#fff4e6;
      --orange-lite:#ffe4c0;
      --n900: #111;
      --n800: #222;
      --n700: #3a3a3a;
      --n600: #555;
      --n500: #777;
      --n400: #999;
      --n300: #ccc;
      --n200: #e4e4e4;
      --n100: #f2f2f2;
      --n50:  #f9f9f9;
      --white:#fff;
      --shadow-sm:  0 1px 5px rgba(0,0,0,.06);
      --shadow-md:  0 4px 20px rgba(0,0,0,.09);
      --shadow-lg:  0 12px 48px rgba(0,0,0,.13);
      --r-sm:8px; --r-md:14px; --r-lg:22px; --r-xl:30px; --r-full:9999px;
      --font-sans:'Noto Sans JP',sans-serif;
      --font-serif:'Shippori Mincho','Noto Serif JP',serif;
      --font-mono:'DM Mono',monospace;
      --header-h:60px;
      --sidebar-w:288px;
      --info-w:240px;
      --t:0.2s cubic-bezier(0.4,0,0.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{font-family:var(--font-sans);background:var(--n50);color:var(--n900);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
    a{text-decoration:none;color:inherit;}
    button{cursor:pointer;border:none;background:none;font-family:inherit;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(1,137,77,.3);border-radius:4px;}

    /* ─── Loading ─── */
    #ls{position:fixed;inset:0;background:var(--green-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .7s ease,visibility .7s ease;}
    #ls.hidden{opacity:0;visibility:hidden;pointer-events:none;}
    .ls-inner{display:flex;flex-direction:column;align-items:center;gap:0;animation:lsFadeUp .5s ease forwards;}
    .ls-mark{width:64px;height:64px;background:linear-gradient(145deg,var(--orange) 0%,#c85500 100%);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 6px 28px rgba(232,104,10,.5);margin-bottom:20px;}
    .ls-ttl{font-family:var(--font-serif);font-size:26px;color:#fff;letter-spacing:.06em;margin-bottom:4px;}
    .ls-sub{font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.22em;text-transform:uppercase;margin-bottom:36px;}
    .ls-bar{width:160px;height:2px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;}
    .ls-fill{height:100%;background:var(--orange);border-radius:99px;animation:lbar 2s ease forwards;}
    @keyframes lbar{0%{width:0}55%{width:70%}100%{width:100%}}
    @keyframes lsFadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

    /* ─── App ─── */
    #app{display:flex;flex-direction:column;height:100dvh;opacity:0;transition:opacity .5s ease;}
    #app.visible{opacity:1;}

    /* ─── Header ─── */
    .hdr{height:var(--header-h);background:var(--white);border-bottom:1px solid var(--n200);display:flex;align-items:center;padding:0 18px;gap:12px;position:sticky;top:0;z-index:100;flex-shrink:0;}
    .hdr-logo{display:flex;align-items:center;gap:9px;flex-shrink:0;}
    .hdr-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--green) 0%,var(--green-dark) 100%);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 2px 8px rgba(1,137,77,.25);}
    .hdr-name{font-family:var(--font-serif);font-size:16px;color:var(--green-dark);letter-spacing:.05em;line-height:1;}
    .hdr-name em{display:block;font-style:normal;font-family:var(--font-sans);font-size:9px;font-weight:400;color:var(--n400);letter-spacing:.14em;text-transform:uppercase;margin-top:3px;}
    .hdr-sep{width:1px;height:24px;background:var(--n200);}
    .hdr-context{flex:1;min-width:0;}
    .hdr-ctx-main{font-size:12px;font-weight:500;color:var(--n700);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .hdr-ctx-sub{font-size:10px;color:var(--n400);margin-top:1px;}
    .hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
    .btn-admin{display:none;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r-full);background:var(--n100);font-size:11px;color:var(--n500);border:1px solid var(--n200);transition:var(--t);}
    .btn-admin:hover{background:var(--n200);}
    .btn-admin.show{display:flex;}
    .hdr-status{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--r-full);border:1px solid var(--n200);background:var(--n50);}
    .hdr-dot{width:7px;height:7px;border-radius:50%;background:var(--n300);flex-shrink:0;transition:var(--t);}
    .hdr-dot.on{background:var(--green);box-shadow:0 0 0 3px rgba(1,137,77,.18);animation:pulse 2.4s ease-in-out infinite;}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(1,137,77,.18)}50%{box-shadow:0 0 0 5px rgba(1,137,77,.08)}}
    .hdr-stxt{font-size:11px;color:var(--n500);font-weight:500;}
    .hdr-stxt.on{color:var(--green-dark);}
    .burger{display:none;width:36px;height:36px;border-radius:var(--r-sm);flex-direction:column;align-items:center;justify-content:center;gap:4.5px;transition:var(--t);}
    .burger:hover{background:var(--n100);}
    .burger span{display:block;width:18px;height:1.5px;background:var(--n700);border-radius:2px;transition:var(--t);}

    /* ─── Layout ─── */
    .wrap{display:flex;flex:1;overflow:hidden;}

    /* ─── Sidebar ─── */
    .sb{width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--n200);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:transform var(--t);}
    .sb-section{padding:14px 14px 10px;}
    .sb-label{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--n400);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
    .sb-label::after{content:'';flex:1;height:1px;background:var(--n200);}
    .up-zone{border:2px dashed rgba(1,137,77,.25);border-radius:var(--r-md);padding:16px 12px;text-align:center;cursor:pointer;transition:var(--t);background:var(--green-pale);position:relative;overflow:hidden;}
    .up-zone:hover,.up-zone.drag{border-color:var(--green);background:var(--green-lite);}
    .up-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
    .up-ico{font-size:24px;margin-bottom:5px;}
    .up-main{font-size:12px;font-weight:500;color:var(--green-dark);margin-bottom:2px;}
    .up-hint{font-size:10px;color:var(--n500);line-height:1.5;}

    /* ─── Chat ─── */
    .chat{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--n50);}
    .qbar{padding:10px 16px;background:var(--white);border-bottom:1px solid var(--n200);display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
    .qbar::-webkit-scrollbar{display:none;}
    .qchip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r-full);border:1.5px solid var(--n200);font-size:11.5px;font-weight:500;color:var(--n700);background:var(--white);transition:var(--t);cursor:pointer;white-space:nowrap;}
    .qchip:hover{background:var(--green-pale);border-color:rgba(1,137,77,.3);color:var(--green-dark);}

    /* iframe - 改善ポイント：中央寄せと最大幅の設定 */
    .iframe-wrap{flex:1;position:relative;overflow:hidden;display:flex;justify-content:center;background:var(--n50);}
    #difyFrame {
      width: 100%;
      max-width: 900px; /* チャットが極端に大きくならないように制限 */
      height: 100%;
      border: none;
      box-shadow: var(--shadow-sm);
    }

    /* ─── Placeholder ─── */
    .ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;background:var(--n50);z-index:10;}

    /* ─── Info Panel ─── */
    .info{width:var(--info-w);background:var(--white);border-left:1px solid var(--n200);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
    .ip{padding:14px;border-bottom:1px solid var(--n100);}
    .ip-ttl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--n400);margin-bottom:11px;display:flex;align-items:center;gap:6px;}
    .ip-ttl::after{content:'';flex:1;height:1px;background:var(--n200);}

    /* Profile card & etc... (保持) */
    .pc{margin:0 14px 10px;padding:14px;background:linear-gradient(140deg,var(--green-dark) 0%,#003d20 100%);border-radius:var(--r-md);color:white;position:relative;overflow:hidden;}
    .pc-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;position:relative;}
    .pc-av{width:34px;height:34px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
    .pc-name{font-size:13px;font-weight:500;}
    .pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
    .pc-cell{background:rgba(255,255,255,.1);border-radius:7px;padding:8px 10px;}

    /* ─── Footer ─── */
    .footer{background:var(--green-dark);color:rgba(255,255,255,.55);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .ft-brand{font-family:var(--font-serif);font-size:13px;color:rgba(255,255,255,.85);}

    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--n900);color:white;padding:9px 18px;border-radius:var(--r-full);font-size:12px;opacity:0;transition:var(--t);pointer-events:none;z-index:1000;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>

<div id="ls">
  <div class="ls-inner">
    <div class="ls-mark">🌿</div>
    <div class="ls-ttl">おかねの相談室</div>
    <div class="ls-sub">Resona AI Financial Advisor</div>
    <div class="ls-bar"><div class="ls-fill"></div></div>
  </div>
</div>

<div id="app">
  <header class="hdr">
    <button class="burger" id="burgerBtn"><span></span><span></span><span></span></button>
    <div class="hdr-logo">
      <div class="hdr-mark">🌿</div>
      <div class="hdr-name">おかねの相談室<em>Resona AI Financial Advisor</em></div>
    </div>
    <div class="hdr-sep"></div>
    <div class="hdr-context">
      <div class="hdr-ctx-main" id="hdrCtxMain">AIと話しながら、お金の未来を考える</div>
      <div class="hdr-ctx-sub">データをアップロードして相談開始</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-status">
        <div class="hdr-dot" id="hdrDot"></div>
        <span class="hdr-stxt" id="hdrStxt">AIに接続中...</span>
      </div>
    </div>
  </header>

  <div class="wrap">
    <aside class="sb" id="sb">
      <div class="sb-section">
        <div class="sb-label">データを読み込む</div>
        <div class="up-zone" id="upZone">
          <input type="file" id="fileInp" accept=".xlsx,.csv,.pdf,.xls">
          <div class="up-ico">📂</div>
          <div class="up-main">明細をドロップ</div>
        </div>
      </div>
      <div style="padding:0 14px 10px;">
        <div class="pc">
          <div class="pc-row">
            <div class="pc-av">👤</div>
            <div><div class="pc-name">田中 美咲 様</div></div>
          </div>
          <div class="pc-grid">
            <div class="pc-cell"><div class="pc-val">3件</div><div class="pc-lbl">読込済</div></div>
            <div class="pc-cell"><div class="pc-val">5年</div><div class="pc-lbl">分析</div></div>
          </div>
        </div>
      </div>
      <nav class="sb-nav">
        <div class="nav-grp">メニュー</div>
        <div class="nav-item active"><span class="nav-ico">💬</span>AIに相談する</div>
      </nav>
    </aside>

    <main class="chat">
      <div class="qbar">
        <button class="qchip" onclick="copyToChat('5年間の支出傾向を教えて')">📈 支出傾向</button>
        <button class="qchip" onclick="copyToChat('毎月の貯蓄余力は？')">💰 貯蓄余力</button>
      </div>

      <div class="iframe-wrap">
        <iframe id="difyFrame" src="about:blank" allow="microphone"></iframe>

        <div class="ph" id="ph">
          <div class="ph-deco">🤖</div>
          <div class="ph-ttl">AIファイナンシャルアドバイザー</div>
          <div class="ph-body">データを分析する準備ができました。<br>下のボタンから対話を開始してください。</div>
          <button class="btn-save" style="width:200px;" onclick="initDify()">相談をはじめる</button>
        </div>
      </div>
    </main>

    <aside class="info">
      <div class="ip">
        <div class="ip-ttl">インサイト</div>
        <div style="font-size:11px; color:var(--n600); line-height:1.6; padding:10px; background:var(--n50); border-radius:8px;">
          最新のデータを読み込むと、ここに分析結果が表示されます。
        </div>
      </div>
    </aside>
  </div>

  <footer class="footer">
    <div class="ft-brand">りそな銀行</div>
    <div style="font-size:10px;">© 2026 Resona Bank, Ltd.</div>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
// DifyのURLを定数で管理
const DIFY_URL = "https://udify.app/chatbot/fCguvhc6kbDWNOAZ";

function initDify() {
  const frame = document.getElementById('difyFrame');
  const ph = document.getElementById('ph');
  const dot = document.getElementById('hdrDot');
  const stxt = document.getElementById('hdrStxt');

  frame.src = DIFY_URL;
  frame.style.display = 'block';
  ph.style.display = 'none';
  
  // ステータス更新
  dot.classList.add('on');
  stxt.textContent = 'AI 接続中';
  stxt.classList.add('on');
}

function copyToChat(text) {
  navigator.clipboard.writeText(text);
  showToast('📋 質問をコピーしました。チャットへ貼り付けてください。');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('ls').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
  }, 1500);
});
</script>

</body>
</html>

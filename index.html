<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>おかねの相談室 | りそなグループ AIアドバイザー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600&family=Shippori+Mincho:wght@400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --green:      #01894d;
      --green-dark: #005c35;
      --green-mid:  #019a58;
      --green-lite: #dff2ea;
      --green-pale: #f0faf5;
      --orange:      #e8680a;
      --orange-mid: #f07800;
      --orange-pale:#fff4e6;
      --orange-lite:#ffe4c0;
      --n900: #111;
      --n800: #222;
      --n700: #3a3a3a;
      --n600: #555;
      --n500: #777;
      --n400: #999;
      --n300: #ccc;
      --n200: #e4e4e4;
      --n100: #f2f2f2;
      --n50:  #f9f9f9;
      --white:#fff;
      --shadow-sm:  0 1px 5px rgba(0,0,0,.06);
      --shadow-md:  0 4px 20px rgba(0,0,0,.09);
      --shadow-lg:  0 12px 48px rgba(0,0,0,.13);
      --r-sm:8px; --r-md:14px; --r-lg:22px; --r-xl:30px; --r-full:9999px;
      --font-sans:'Noto Sans JP',sans-serif;
      --font-serif:'Shippori Mincho','Noto Serif JP',serif;
      --header-h:64px;
      --sidebar-w:300px;
      --t:0.25s cubic-bezier(0.4,0,0.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-sans);background:var(--n50);color:var(--n900);height:100dvh;overflow:hidden;display:flex;flex-direction:column;}
    
    /* ─── Header ─── */
    .hdr{height:var(--header-h);background:var(--white);border-bottom:2px solid var(--green);display:flex;align-items:center;padding:0 20px;z-index:100;box-shadow:var(--shadow-sm);}
    .hdr-logo{display:flex;align-items:center;gap:12px;}
    .hdr-mark{width:38px;height:38px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;color:white;}
    .hdr-name{font-family:var(--font-serif);font-size:18px;font-weight:700;color:var(--green-dark);}
    .hdr-name span{font-family:var(--font-sans);font-size:10px;display:block;color:var(--n400);font-weight:400;margin-top:2px;}
    
    .wrap{display:flex;flex:1;overflow:hidden;}

    /* ─── Sidebar ─── */
    .sb{width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--n200);display:flex;flex-direction:column;padding:20px;overflow-y:auto;}
    .sb-label{font-size:11px;font-weight:700;color:var(--n400);margin-bottom:12px;letter-spacing:0.1em;}
    
    .up-zone{border:2px dashed var(--green-lite);border-radius:var(--r-md);padding:24px 16px;text-align:center;background:var(--green-pale);transition:var(--t);cursor:pointer;position:relative;}
    .up-zone:hover{border-color:var(--green);background:var(--white);}
    .up-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;}
    .up-ico{font-size:28px;margin-bottom:8px;}
    .up-main{font-size:13px;font-weight:600;color:var(--green-dark);}

    /* ─── Main Chat Area ─── */
    .main-content{flex:1;display:flex;flex-direction:column;position:relative;background:white;}
    
    /* Dify Container */
    #dify-iframe-container {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 10;
    }

    .placeholder-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--green-pale);
      z-index: 5;
      padding: 40px;
      text-align: center;
    }
    .hero-icon { font-size: 64px; margin-bottom: 20px; animation: float 3s infinite ease-in-out; }
    @keyframes float { 0%,100% {transform: translateY(0);} 50% {transform: translateY(-10px);} }
    
    /* ─── Footer ─── */
    .ftr{height:40px;background:var(--green-dark);color:white;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:0.05em;}

    /* ─── Dify UI Overrides (If applicable via iframe) ─── */
    #dify-chatbot-bubble-button { background-color: var(--green) !important; }
  </style>
</head>
<body>

  <header class="hdr">
    <div class="hdr-logo">
      <div class="hdr-mark">🌿</div>
      <div class="hdr-name">おかねの相談室 <span>Resona AI Financial Advisor</span></div>
    </div>
  </header>

  <div class="wrap">
    <aside class="sb">
      <div class="sb-label">DATA UPLOAD</div>
      <div class="up-zone">
        <input type="file" id="fileInp" accept=".xlsx,.csv,.pdf">
        <div class="up-ico">📁</div>
        <div class="up-main">明細データをアップロード</div>
        <p style="font-size:10px; color:var(--n500); margin-top:8px;">家計簿や銀行明細をAIが分析します</p>
      </div>

      <div style="margin-top:30px;">
        <div class="sb-label">ANALYSIS INSIGHTS</div>
        <div style="background:var(--orange-pale); padding:15px; border-radius:var(--r-md); border-left:4px solid var(--orange);">
          <div style="font-size:12px; font-weight:700; color:var(--orange);">💡 今月のヒント</div>
          <div style="font-size:11px; margin-top:5px; line-height:1.6; color:var(--n700);">
            昨年と比べ、サブスクリプション支出が15%増加しています。不要なプランがないかAIに尋ねてみましょう。
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div id="dify-iframe-container">
          <iframe
            src="https://udify.app/chat/lRGucRJhCbT0w8YijOoDLu8g"
            style="width: 100%; height: 100%; min-height: 700px"
            frameborder="0"
            allow="microphone">
          </iframe>
      </div>
    </main>
  </div>

  <footer class="ftr">
    © 2026 Resona Bank, Ltd. All rights reserved. Powered by Resona AI Project.
  </footer>

  <script>
    window.difyChatbotConfig = {
      token: 'lRGucRJhCbT0w8YijOoDLu8g'
    }
  </script>
  <script
    src="https://udify.app/embed.min.js"
    id="lRGucRJhCbT0w8YijOoDLu8g"
    defer>
  </script>

  <script>
    // ファイルアップロードの疑似エフェクト
    const fileInp = document.getElementById('fileInp');
    fileInp.addEventListener('change', (e) => {
      if(e.target.files.length > 0) {
        alert('データを読み込みました。AIアドバイザーが分析を開始します。');
        // ここでDifyのAPIへファイルを送信するロジックを組むことも可能ですが、
        // 現状はUI上のフィードバックに留めています。
      }
    });
  </script>
</body>
</html>
